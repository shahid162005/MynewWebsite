<!DOCTYPE html>
<html lang="en">
<head>
    <title>Headphone Product</title>

    <link rel="stylesheet" href="laptop.css">
</head>
<body>

    <section class="product-container">
        <div class="product-image">
            <img src="sony.webp" alt="HeadPhone">

        </div>
        <div class="product-details">
            <h1>Sony W1000XM5</h1>
            <p class="price">$399</p>
            <p class="description">
                The Sony W1000XM5 delivers
                powerful performance with the latest
                Audio Chipset and Better Battery Backup.
                Perfect for gaming, music, movies
                and daily use.

            </p>

            <div class="features">

                <h3>Features:</h3>

                <ul>

                    <li>Immersive Sound Quality</li>
                    <li>Best Battery Backup</li>

                </ul>

            </div>

            <div class="quantity-box">

                <label>Quantity:</label>

                <input type="number"
                       value="1"
                       min="1">

            </div>

            <div class="buttons">

                <button class="cart-btn"
                        onclick="window.location.href='cart.html'">

                    Add to Cart

                </button>

                <button class="buy-btn"
                        onclick="window.location.href='checkout.html'">

                    Buy Now

                </button>

            </div>
            <h3 id="message"></h3>

        </div>

    </section>
