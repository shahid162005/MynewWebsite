<!DOCTYPE html>
<html lang="en">
<head>

    <title>Samsung S24</title>

    <link rel="stylesheet" href="sam.css">
</head>
<body>
    <section class="product-container">

        <div class="product-image">

            <img src="sam.webp" alt="">

        </div>

        <div class="product-details">

            <h1>Samsung S24</h1>
            <p class="price">$799</p>
            <p class="description">

                

            </p>
            <div class="features">

                <h3>Features:</h3>

                <ul>
                    <li>Android 26</li>
                    <li>Excellent Camera System</li>
                    <li>Better Battery Backup</li>
                </ul>

            </div>
            <div class="size-box">

                <label>Select Size:</label>

                <select>

                    <option>128 Gb</option>
                    <option>256 Gb</option>
                    <option>512 Gb</option>
                    <option>1 Tb</option>

                </select>

            </div>
            <div class="quantity-box">

                <label>Quantity:</label>

                <input type="number"
                       value="1"
                       min="1">

            </div>
            <div class="buttons">

                <button class="cart-btn"
                        onclick="window.location.href='cart.html'
">
                    Add to Cart
                </button>
                <button class="buy-btn"
                        onclick="window.location.href='checkout.html'">

                    Buy Now

                </button>

            </div>
            <h3 id="message"></h3>
        </div>

    </section><br></br>
