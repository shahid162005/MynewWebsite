<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Puma Running Shoe</title>

    <link rel="stylesheet" href="puma.css">
</head>
<body>
    <section class="product-container">

        <div class="product-image">

            <img src="puma.jpg" alt="Nike Shoe">

        </div>

        <div class="product-details">

            <h1>Puma Running Shoe</h1>

            <p class="price">$75</p>
            <p class="description">
            PUMA running gear for men is both performance-driven and comfort focused, making it an ideal choice for everyone from casual runners to marathon champions.
                

            </p>
            <div class="features">

                <h3>Features:</h3>

                <ul>
                    <li>Soft cushioning</li>
                    <li>Stylish modern design</li>
                    <li>Comfortable for daily usage</li>
                </ul>

            </div>
            <div class="size-box">

                <label>Select Size:</label>

                <select>

                    <option>7 UK</option>
                    <option>8 UK</option>
                    <option>9 UK</option>
                    <option>10 UK</option>

                </select>

            </div>
            <div class="quantity-box">

                <label>Quantity:</label>

                <input type="number"
                       value="1"
                       min="1">

            </div>
            <div class="buttons">

                <button class="cart-btn"
                        onclick="window.location.href='cart.html'
">
                    Add to Cart
                </button>
                <button class="buy-btn"
                        onclick="window.location.href='checkout.html'">

                    Buy Now

                </button>

            </div>
            <h3 id="message"></h3>
        </div>

    </section>
